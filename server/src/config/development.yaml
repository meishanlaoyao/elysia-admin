app:
  id: "Elysia-Admin"
  port: 3000
  prefix: "/api"
  baseCacheTime: 300
  forgetPasswordExpiresIn: 600
  forgetPasswordUrl: "http://192.168.2.112:3006/#/auth/reset-password"
  maxRequestBodySize: 10485760
  timeout: 30
  maxLoginAttempts: 3
  allowPublicRegister: true
  trustProxy: false
  trustedProxyCidrs: []
  corsOrigin: true
  geoIpTimeoutMs: 1500

jwt:
  accessToken:
    expiresIn: "15m"
    secret: "elysia-admin-accessToken"
  refreshToken:
    expiresIn: "7d"
    secret: "elysia-admin-refreshToken"

redis:
  host: "localhost"
  port: 6379
  password: ""
  username: ""
  db: 0

pg:
  host: "localhost"
  port: 5432
  username: "postgres"
  user: "postgres"
  password: "123456"
  database: "elysia-admin"
  max: 10
  idle_timeout: 30
  connect_timeout: 10
  ssl: false

smtp:
  host: "smtp.qq.com"
  port: 465
  secure: true
  auth:
    user: ""
    pass: ""
  pool: true
  maxConnections: 10
  maxMessages: 100
  rateDelta: 1000
  rateLimit: 5

guard:
  ipBlacklist: true
  apiSwitch: true

orders:
  timeout: 900000
