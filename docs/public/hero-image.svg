<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fae8ff;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="miniGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景渐变 -->
  <rect width="400" height="300" fill="url(#bgGrad)" rx="16"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="80" cy="50" r="30" fill="#dbeafe" opacity="0.4"/>
  <circle cx="350" cy="250" r="40" fill="#fae8ff" opacity="0.4"/>
  
  <!-- 后端服务器图标 -->
  <rect x="40" y="80" width="110" height="150" fill="url(#serverGrad)" rx="12" 
        filter="drop-shadow(0 8px 16px rgba(59, 130, 246, 0.3))"/>
  <rect x="52" y="98" width="86" height="18" fill="white" opacity="0.25" rx="4"/>
  <rect x="52" y="125" width="86" height="18" fill="white" opacity="0.25" rx="4"/>
  <rect x="52" y="152" width="86" height="18" fill="white" opacity="0.25" rx="4"/>
  <rect x="52" y="179" width="86" height="18" fill="white" opacity="0.25" rx="4"/>
  <rect x="52" y="206" width="86" height="18" fill="white" opacity="0.25" rx="4"/>
  <text x="95" y="260" font-family="Arial, sans-serif" font-size="12" font-weight="bold" 
        fill="white" text-anchor="middle">Backend</text>
  
  <!-- 前端图标 -->
  <rect x="245" y="40" width="110" height="90" fill="url(#frontGrad)" rx="12"
        filter="drop-shadow(0 6px 12px rgba(59, 130, 246, 0.25))"/>
  <circle cx="300" cy="70" r="10" fill="white" opacity="0.9"/>
  <rect x="262" y="92" width="76" height="10" fill="white" opacity="0.7" rx="3"/>
  <rect x="262" y="107" width="56" height="10" fill="white" opacity="0.7" rx="3"/>
  <text x="300" y="150" font-family="Arial, sans-serif" font-size="11" font-weight="bold" 
        fill="#3b82f6" text-anchor="middle">Frontend</text>
  
  <!-- 小程序图标 -->
  <rect x="245" y="170" width="110" height="90" fill="url(#miniGrad)" rx="12"
        filter="drop-shadow(0 6px 12px rgba(139, 92, 246, 0.25))"/>
  <circle cx="300" cy="200" r="10" fill="white" opacity="0.9"/>
  <rect x="262" y="222" width="76" height="10" fill="white" opacity="0.7" rx="3"/>
  <rect x="262" y="237" width="56" height="10" fill="white" opacity="0.7" rx="3"/>
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="11" font-weight="bold" 
        fill="#8b5cf6" text-anchor="middle">Mini App</text>
  
  <!-- 连接线 - 渐变 -->
  <line x1="150" y1="120" x2="245" y2="85" stroke="url(#lineGrad1)" stroke-width="4" 
        stroke-dasharray="8,6" stroke-linecap="round"/>
  <line x1="150" y1="180" x2="245" y2="215" stroke="url(#lineGrad2)" stroke-width="4" 
        stroke-dasharray="8,6" stroke-linecap="round"/>
  
  <!-- 装饰节点 -->
  <circle cx="197" cy="102" r="6" fill="#3b82f6" filter="drop-shadow(0 2px 4px rgba(59, 130, 246, 0.4))"/>
  <circle cx="197" cy="197" r="6" fill="#8b5cf6" filter="drop-shadow(0 2px 4px rgba(139, 92, 246, 0.4))"/>
  
  <!-- 数据流动效果 -->
  <circle cx="170" cy="110" r="3" fill="#dbeafe" opacity="0.8">
    <animate attributeName="cx" from="170" to="230" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="190" r="3" fill="#fae8ff" opacity="0.8">
    <animate attributeName="cx" from="170" to="230" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
